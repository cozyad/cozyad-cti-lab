title: LummaC2 - Credential Search in Files
id: d0a2f7b1-3e6c-4b9d-7f1a-0a5e4d2b6c80
status: experimental
description: >
    Detects PowerShell or cmd commands searching the filesystem for files
    likely to contain credentials — passwords.txt, *.kdbx (KeePass),
    *.rdp (saved RDP credentials), config files with password strings.
    LummaC2 searches common user directories for plaintext credentials
    and password manager databases.
references:
    - https://attack.mitre.org/techniques/T1552/001
author: BeastIntel / cozyad-cti-lab
date: 2026-04-23
tags:
    - attack.t1552.001
    - attack.credential-access
    - lummac2
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith|any:
            - '\powershell.exe'
            - '\cmd.exe'
            - '\findstr.exe'
        CommandLine|contains|any:
            - 'password'
            - 'passwd'
            - '*.kdbx'
            - '*.rdp'
            - 'credentials'
            - 'secret'
            - 'api_key'
            - '.env'
    condition: selection
falsepositives:
    - Security scanning tools (Tenable, Qualys) searching for credential exposure
    - IT scripts performing credential audits
    - Developer tools searching config files
level: medium
