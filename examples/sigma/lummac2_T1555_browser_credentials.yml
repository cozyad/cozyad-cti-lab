title: LummaC2 - Browser Credential Store Access
id: c9f1e6a0-2d5b-4a8c-6e0f-9f4d3c1a5b79
status: experimental
description: >
    Detects non-browser processes loading browser credential decryption
    libraries (DPAPI) or accessing browser keychain/credential store DLLs.
    LummaC2 uses Windows DPAPI to decrypt browser-stored passwords and
    payment card data. A non-browser process loading dpapi.dll or
    crypt32.dll alongside browser profile access is a strong indicator.
references:
    - https://attack.mitre.org/techniques/T1555/003
author: BeastIntel / cozyad-cti-lab
date: 2026-04-23
tags:
    - attack.t1555.003
    - attack.credential-access
    - lummac2
logsource:
    category: image_load
    product: windows
detection:
    selection:
        ImageLoaded|endswith|any:
            - '\dpapi.dll'
            - '\vaultcli.dll'
    filter:
        Image|endswith|any:
            - '\chrome.exe'
            - '\msedge.exe'
            - '\firefox.exe'
            - '\lsass.exe'
            - '\svchost.exe'
            - '\MsMpEng.exe'
    condition: selection and not filter
falsepositives:
    - Password managers that use DPAPI for local encryption
    - Security tools performing credential audits
level: medium
