title: LummaC2 - rundll32 Execution from Writable User Path
id: e5b7a2c6-8f1d-4c4e-2a6b-5b0f9e7c1d35
status: experimental
description: >
    Detects rundll32.exe loading DLLs from user-writable directories.
    LummaC2 stages its loader DLL in accessible paths (Users\Public, AppData,
    Temp) and executes via rundll32 to avoid writing to protected system paths.
    Legitimate rundll32 usage loads DLLs from System32 or Program Files.
    Validated against live Sysmon telemetry (AA25-141B lab).
references:
    - https://attack.mitre.org/techniques/T1106
    - https://attack.mitre.org/techniques/T1218/011
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-141b
author: BeastIntel / cozyad-cti-lab
date: 2026-04-23
tags:
    - attack.t1106
    - attack.t1218.011
    - attack.execution
    - attack.defense-evasion
    - lummac2
logsource:
    category: process_creation
    product: windows
detection:
    selection_image:
        Image|endswith: '\rundll32.exe'
    selection_path:
        CommandLine|contains|any:
            - '\Users\Public\'
            - '\AppData\Local\Temp\'
            - '\AppData\Roaming\'
            - '\Windows\Temp\'
            - '\ProgramData\'
            - '\Downloads\'
    condition: selection_image and selection_path
falsepositives:
    - Some legitimate software installers stage DLLs in AppData during setup
    - Windows Update components occasionally use Temp paths
    - Cross-reference DLL hash against known-good inventory
level: high
