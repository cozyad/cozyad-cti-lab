# Splunk Universal Forwarder inputs for the CTI lab detonation VM.
#
# This is the source-of-truth reference. The Windows bootstrap
# (infra/bootstrap/windows_startup.ps1) writes the same content to
# C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf.
# Keep the two in sync when editing.

[default]
host = cti-win-detonation

# ---- Sysmon ------------------------------------------------------------------
# Primary source for TTP detection. SwiftOnSecurity config baseline is deployed
# by the bootstrap script.
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
renderXml = true
index = sysmon
sourcetype = XmlWinEventLog:Microsoft-Windows-Sysmon/Operational

# ---- Windows Security --------------------------------------------------------
[WinEventLog://Security]
disabled = false
renderXml = true
index = wineventlog
sourcetype = WinEventLog:Security

# ---- PowerShell logs ---------------------------------------------------------
# Scriptblock + module logging enabled via registry by the bootstrap.
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = false
renderXml = true
index = wineventlog
sourcetype = WinEventLog:Microsoft-Windows-PowerShell/Operational

[WinEventLog://Windows PowerShell]
disabled = false
renderXml = true
index = wineventlog
sourcetype = WinEventLog:PowerShell

# ---- Baseline system/application ---------------------------------------------
[WinEventLog://System]
disabled = false
renderXml = true
index = wineventlog

[WinEventLog://Application]
disabled = false
renderXml = true
index = wineventlog

# ---- Atomic Red Team execution log ------------------------------------------
# Human-readable chain record produced by atomic/lumma_ttp_chain.ps1. Correlate
# against Sysmon events on host=cti-win-detonation within the same time window.
[monitor://C:\CTILab\logs\atomic-*.log]
disabled = false
index = atomic_red_team
sourcetype = atomic:execution:log
