# Indexes used by the CTI lab. Apply on the Splunk indexer (VM1) once the
# Splunk container is live. These names are referenced by the forwarder's
# inputs.conf on VM2 - keep them aligned.
#
# Install path on the indexer container:
#   /opt/splunk/etc/apps/cozyad_cti/local/indexes.conf

[sysmon]
homePath   = $SPLUNK_DB/sysmon/db
coldPath   = $SPLUNK_DB/sysmon/colddb
thawedPath = $SPLUNK_DB/sysmon/thaweddb
maxTotalDataSizeMB = 5120

[wineventlog]
homePath   = $SPLUNK_DB/wineventlog/db
coldPath   = $SPLUNK_DB/wineventlog/colddb
thawedPath = $SPLUNK_DB/wineventlog/thaweddb
maxTotalDataSizeMB = 5120

[atomic_red_team]
homePath   = $SPLUNK_DB/atomic_red_team/db
coldPath   = $SPLUNK_DB/atomic_red_team/colddb
thawedPath = $SPLUNK_DB/atomic_red_team/thaweddb
maxTotalDataSizeMB = 1024
